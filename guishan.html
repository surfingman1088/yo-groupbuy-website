<style>
  :root {
    --accent: #059669;
    --accent-strong: #047857;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --bg: #f8fafc;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Segoe UI", sans-serif;
    line-height: 1.4;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 0 0 auto;
  }
  header img {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: block;
  }
  header .brand-name { font-weight: 700; font-size: 14px; color: var(--text-secondary); }

  h1 {
    font-size: 24px;
    line-height: 1.3;
    font-weight: 800;
    margin: 10px 0 12px;
    flex: 0 0 auto;
  }

  .hero {
    width: 100%;
    height: auto;
    aspect-ratio: 8 / 5;
    max-height: 34vh;
    object-fit: cover;
    border-radius: 16px;
    display: block;
    flex: 0 1 auto;
  }

  .subtitle {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent-strong);
    margin: 14px 0 0;
    flex: 0 0 auto;
  }

  .spacer { flex: 1 1 auto; min-height: 14px; }

  .cta-btn {
    display: block;
    width: 100%;
    box-sizing: border-box;
    background: var(--accent);
    color: #ffffff;
    text-align: center;
    font-size: 18px;
    font-weight: 800;
    text-decoration: none;
    padding: 16px 20px;
    border-radius: 999px;
    min-height: 48px;
    box-shadow: 0 8px 20px rgba(5, 150, 105, 0.28);
    flex: 0 0 auto;
  }
  .cta-btn:active { background: var(--accent-strong); }

  footer {
    margin-top: 14px;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    flex: 0 0 auto;
  }
</style>

<body>

<div class="wrap">

  <header>
    <img src="assets/landing/k-logo.webp" width="32" height="32" alt="K團購">
    <span class="brand-name">龜山K團購</span>
  </header>

  <h1>龜山K團購・8/15盛大開幕</h1>

  <img
    class="hero"
    src="assets/landing/hero.webp"
    width="800"
    height="500"
    fetchpriority="high"
    alt="龜山K團購長庚A8店 — 小農直送每週新鮮蔬果，產地直達比超市新鮮、一件免運、可退貨退款">

  <p class="subtitle">小農直送・一件免運・可退貨退款</p>

  <div class="spacer"></div>

  <a id="cta" class="cta-btn" href="https://www.facebook.com/groups/1561057388927848/">立即加入社團</a>

  <footer>龜山K團購（悠冉企業社）｜統一編號 93000758</footer>

</div>

<script>
  (function () {
    "use strict";

    var cta = document.getElementById("cta");
    var target = cta.getAttribute("href");
    var params = new URLSearchParams(window.location.search);
    var adSource = params.get("ad") || "unknown";
    var AUTO_DELAY = 1800; // ms — user sees real content for 1.5–2s before auto-redirect
    var redirected = false;

    if (typeof fbq === "function") {
      fbq("track", "PageView");
    }

    function go(trigger) {
      if (redirected) return;
      redirected = true;
      window.clearTimeout(autoTimer);

      if (typeof fbq === "function") {
        fbq("trackCustom", "ClickJoinGroup", { ad_source: adSource, trigger: trigger });
      }

      window.setTimeout(function () {
        window.location.href = target;
      }, 120);
    }

    var autoTimer = window.setTimeout(function () {
      go("auto");
    }, AUTO_DELAY);

    cta.addEventListener("click", function (event) {
      event.preventDefault();
      go("manual");
    });
  })();
</script>

</body>
